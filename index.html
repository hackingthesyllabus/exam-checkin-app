<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam App</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#d1d5db;
      --panel:#f8fafc;
      --blue:#2563eb;
      --green:#00c853;
      --green-soft:#b9f6ca;
      --orange:#ff8f00;
      --orange-soft:#ffe0b2;
      --red:#ff1744;
      --red-soft:#ffcdd2;
      --gray:#4b5563;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{padding:18px}
    .app{max-width:1280px;margin:0 auto}
    button,input,select,textarea{font:inherit}
    .topnav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:18px}
    .nav-btn,.action-btn,.student-option,.locker-btn,.touch-check{
      border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);
      padding:14px 18px;min-height:54px;font-weight:700;cursor:pointer;
      box-shadow:0 1px 0 rgba(0,0,0,.04);transition:transform .05s ease,box-shadow .08s ease,background .12s ease;
    }
    .nav-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
    .action-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
    .action-btn.green{background:var(--green);border-color:var(--green);color:#fff}
    .action-btn.orange{background:var(--orange);border-color:var(--orange);color:#fff}
    .action-btn.red{background:var(--red);border-color:var(--red);color:#fff}
    .action-btn.gray{background:var(--gray);border-color:var(--gray);color:#fff}
    button:hover,.student-option:hover,.locker-btn:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
    button:active,.pressed{transform:translateY(2px) scale(.99);box-shadow:inset 0 2px 6px rgba(0,0,0,.18)}
    button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
    .screen{display:none}
    .screen.active{display:block}
    .panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:18px}
    .centered{max-width:1020px;margin:0 auto}
    .home-grid,.grid2,.grid3,.stats,.student-list,.detail-grid,.notification-list,.locker-grid,.checkin-progress,.summary-grid{
      display:grid;gap:14px
    }
    .home-grid{grid-template-columns:repeat(5,minmax(0,1fr))}
    .grid2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .summary-grid{grid-template-columns:1.2fr .8fr}
    .stats{grid-template-columns:repeat(4,minmax(0,1fr))}
    .detail-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .student-list,.notification-list{grid-template-columns:1fr}
    .locker-grid{grid-template-columns:repeat(10,minmax(0,1fr));gap:10px}
    .checkin-progress{grid-template-columns:repeat(5,minmax(0,1fr));margin-bottom:16px}
    .home-card,.student-card,.note-card,.wizard-card{border:1px solid var(--line);border-radius:16px;background:#fff;padding:16px}
    .home-card{background:var(--panel);display:grid;gap:10px;align-content:center;min-height:160px;text-align:center}
    .muted{color:var(--muted)}
    label{display:block;margin-bottom:6px;font-weight:700}
    input[type="text"],input[type="datetime-local"],select,textarea{
      width:100%;padding:15px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);font-size:1rem
    }
    select.large, textarea.large, input.large{font-size:1.05rem;padding:17px 16px;min-height:58px}
    textarea{min-height:100px;resize:vertical}
    .student-option{text-align:left;width:100%}
    .student-option.active{outline:3px solid rgba(37,99,235,.18);border-color:var(--blue);background:#eff6ff}
    .student-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    .student-header h3{margin:0 0 8px 0}
    .pill-row{display:flex;gap:8px;flex-wrap:wrap}
    .pill{padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:var(--panel);font-size:.86rem}
    .pill.green{background:var(--green-soft);border-color:#69f0ae}
    .pill.orange{background:var(--orange-soft);border-color:#ffb74d}
    .pill.red{background:var(--red-soft);border-color:#ff8a80}
    .stat-box{border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--panel);text-align:center}
    .stat-box .label{font-size:.84rem;color:var(--muted);margin-bottom:6px}
    .stat-box .value{font-weight:700}
    .history{max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fafafa}
    .history-item{padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:.92rem}
    .history-item:last-child{border-bottom:0}
    .empty{text-align:center;color:var(--muted);padding:24px;border:1px dashed var(--line);border-radius:14px}
    .progress-pill{padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:var(--panel);font-weight:700;font-size:.9rem;text-align:center}
    .progress-pill.active{background:#dbeafe;border-color:#60a5fa}
    .progress-pill.done{background:#dcfce7;border-color:#86efac}
    .touch-check{display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;width:100%;min-height:68px}
    .touch-check.active,.locker-btn.active{background:#dbeafe;border-color:#60a5fa;outline:2px solid rgba(96,165,250,.25)}
    .touch-box{width:30px;height:30px;border:2px solid var(--line);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto}
    .touch-check.active .touch-box{background:var(--blue);border-color:var(--blue);color:#fff}
    .script-box{border:1px solid var(--line);background:#f8fafc;border-radius:14px;padding:16px;line-height:1.5}
    .signature-page{position:fixed;inset:0;background:#fff;z-index:999;display:none;overflow:hidden;padding:18px}
    .signature-page.active{display:flex;flex-direction:column}
    .signature-wrapper{flex:1 1 auto;display:flex;flex-direction:column;gap:14px;max-width:1100px;width:100%;margin:0 auto;min-height:0}
    .signature-canvas{flex:1 1 auto;width:100%;min-height:320px;border:2px solid var(--line);border-radius:16px;touch-action:none;background:#fff}
    .signature-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .status-dot{width:20px;height:20px;border-radius:999px;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);display:inline-block}
    .status-dot.green{background:var(--green)}
    .status-dot.orange{background:var(--orange)}
    .status-dot.red{background:var(--red)}
    .blink-slow{animation:blinkSlow 2s linear infinite}
    .blink-medium{animation:blinkMedium 1s linear infinite}
    .blink-fast{animation:blinkFast .5s linear infinite}
    @keyframes blinkSlow{0%,49%{opacity:1}50%,100%{opacity:.2}}
    @keyframes blinkMedium{0%,49%{opacity:1}50%,100%{opacity:.1}}
    @keyframes blinkFast{0%,49%{opacity:1}50%,100%{opacity:.02}}
    .summary-row{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#fff}
    .summary-row.green-active{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,200,83,.18)}
    .summary-row.orange-active{border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,143,0,.18)}
    .summary-row.red-active{border-color:var(--red);box-shadow:0 0 0 2px rgba(255,23,68,.18)}
    .banner{display:none;padding:16px;border-radius:16px;font-weight:700;text-align:center;margin-bottom:16px}
    .banner.show{display:block}
    .banner.orange{background:#ffe0b2;border:2px solid var(--orange);color:#e65100}
    .banner.green{background:#b9f6ca;border:2px solid var(--green);color:#00695c}
    .banner.red{background:#ffcdd2;border:2px solid var(--red);color:#b71c1c}
    .flash-orange{animation:pageOrange 1s linear infinite}
    .flash-green{animation:pageGreen .5s linear infinite}
    .flash-red{animation:pageRed .5s linear infinite}
    @keyframes pageOrange{0%,49%{background:#fff3e0}50%,100%{background:#ffffff}}
    @keyframes pageGreen{0%,49%{background:#e8f5e9}50%,100%{background:#ffffff}}
    @keyframes pageRed{0%,49%{background:#ffebee}50%,100%{background:#ffffff}}
    @media (max-width: 1000px){
      .home-grid,.stats,.detail-grid,.grid3,.locker-grid,.signature-actions,.checkin-progress,.summary-grid{grid-template-columns:1fr}
      .grid2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <div class="topnav">
      <button class="nav-btn active" type="button" data-screen="home">Home</button>
      <button class="nav-btn" type="button" data-screen="checkin">Check In</button>
      <button class="nav-btn" type="button" data-screen="checkout">Check Out</button>
      <button class="nav-btn" type="button" data-screen="students">View Students</button>
      <button class="nav-btn" type="button" data-screen="breaks">Break</button>
      <button class="nav-btn" type="button" data-screen="notifications">Notifications</button>
    </div>

    <section id="screen-home" class="screen active">
      <div id="homeBanner" class="banner"></div>
      <div class="panel">
        <div class="summary-grid">
          <div>
            <h2 style="margin-top:0">Current students and next notifications</h2>
            <div id="homeSummaryList"></div>
          </div>
          <div>
            <div class="home-grid" style="grid-template-columns:1fr; margin-top:0">
              <div class="home-card"><h2>Check In</h2><button class="action-btn primary" type="button" data-screen="checkin">Open</button></div>
              <div class="home-card"><h2>Check Out</h2><button class="action-btn green" type="button" data-screen="checkout">Open</button></div>
              <div class="home-card"><h2>View Students</h2><button class="action-btn gray" type="button" data-screen="students">Open</button></div>
              <div class="home-card"><h2>Break</h2><button class="action-btn orange" type="button" data-screen="breaks">Open</button></div>
              <div class="home-card"><h2>Notifications</h2><button class="action-btn red" type="button" data-screen="notifications">Open</button></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-checkin" class="screen">
      <div class="panel centered">
        <h2>Check In</h2>
        <div id="checkinSummaryList" style="margin-bottom:14px;"></div>
        <div class="checkin-progress" id="checkinProgress"></div>
        <div id="checkinStepContent"></div>
      </div>
    </section>

    <section id="screen-checkout" class="screen">
      <div class="panel centered">
        <h2>Check Out</h2>
        <div class="grid2">
          <div><label for="checkoutSearch">Search</label><input id="checkoutSearch" type="text" placeholder="Search by name, seat, course" /></div>
          <div><label for="checkoutFilter">Filter</label>
            <select id="checkoutFilter" class="large">
              <option value="all">All students</option>
              <option value="checked_in">Checked in</option>
              <option value="finished">Finished</option>
              <option value="not_checked_in">Not checked in</option>
            </select>
          </div>
        </div>
        <div id="checkoutStudentList" class="student-list" style="margin-top:14px;"></div>
      </div>
    </section>

    <section id="screen-students" class="screen">
      <div class="panel">
        <h2>View Students</h2>
        <div class="grid3">
          <div><label for="studentSearch">Search</label><input id="studentSearch" type="text" placeholder="Search by name, seat, course, professor" /></div>
          <div><label for="studentStatusFilter">Status</label>
            <select id="studentStatusFilter" class="large">
              <option value="all">All students</option>
              <option value="not_checked_in">Not checked in</option>
              <option value="checked_in">Checked in</option>
              <option value="on_break">On break</option>
              <option value="finished">Finished</option>
            </select>
          </div>
          <div style="display:flex; align-items:end;"><button id="reloadCsvBtn" class="action-btn gray" type="button" style="width:100%;">Reload CSV</button></div>
        </div>
        <div id="studentList" class="student-list" style="margin-top:14px;"></div>
      </div>
    </section>

    <section id="screen-breaks" class="screen">
      <div class="panel">
        <h2>Break</h2>
        <div id="breakList" class="student-list"></div>
      </div>
    </section>

    <section id="screen-notifications" class="screen">
      <div id="globalNotificationBanner" class="banner"></div>
      <div class="panel centered">
        <h2>Notifications</h2>
        <div class="grid2" style="margin-bottom:14px;">
          <button id="silenceNotificationsBtn" class="action-btn gray" type="button">Silence current notifications</button>
          <button id="unsilenceNotificationsBtn" class="action-btn primary" type="button">Enable notifications again</button>
        </div>
        <div id="notificationList" class="notification-list"></div>
      </div>
    </section>
  </div>

  <div id="signaturePage" class="signature-page">
    <div class="signature-wrapper">
      <div>
        <h2>Student Signature</h2>
        <p id="signatureIntro">Please review the statement below and sign inside the box.</p>
      </div>
      <div class="script-box" id="signatureScriptBox"></div>
      <canvas id="signatureCanvas" class="signature-canvas"></canvas>
      <div class="signature-actions">
        <button id="clearSignatureBtn" class="action-btn gray" type="button">Clear Signature</button>
        <button id="cancelSignatureBtn" class="action-btn orange" type="button">Back</button>
        <button id="confirmSignatureBtn" class="action-btn green" type="button">Signed and Complete Check In</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "exam_app_session_v7";
    const CSV_PATH = "students.csv";

    let students = [];
    let selectedCheckinId = null;
    let notificationsSilenced = false;
    let signatureStudentId = null;
    let signatureHasInk = false;

    const appRoot = document.getElementById("appRoot");
    const homeBanner = document.getElementById("homeBanner");
    const checkinProgress = document.getElementById("checkinProgress");
    const checkinStepContent = document.getElementById("checkinStepContent");
    const homeSummaryList = document.getElementById("homeSummaryList");
    const checkinSummaryList = document.getElementById("checkinSummaryList");
    const checkoutSearch = document.getElementById("checkoutSearch");
    const checkoutFilter = document.getElementById("checkoutFilter");
    const checkoutStudentList = document.getElementById("checkoutStudentList");
    const studentSearch = document.getElementById("studentSearch");
    const studentStatusFilter = document.getElementById("studentStatusFilter");
    const studentList = document.getElementById("studentList");
    const breakList = document.getElementById("breakList");
    const notificationList = document.getElementById("notificationList");
    const globalNotificationBanner = document.getElementById("globalNotificationBanner");

    const signaturePage = document.getElementById("signaturePage");
    const signatureCanvas = document.getElementById("signatureCanvas");
    const signatureIntro = document.getElementById("signatureIntro");
    const signatureScriptBox = document.getElementById("signatureScriptBox");
    const clearSignatureBtn = document.getElementById("clearSignatureBtn");
    const cancelSignatureBtn = document.getElementById("cancelSignatureBtn");
    const confirmSignatureBtn = document.getElementById("confirmSignatureBtn");
    const signatureCtx = signatureCanvas.getContext("2d");
    let drawing = false;
    let lastPoint = null;

    function safeCall(fn){ try{ fn(); }catch(error){ console.error(error); alert("A script error occurred. Replace index.html with the newest file."); } }
    function clone(v){ return JSON.parse(JSON.stringify(v)); }
    function toTimestamp(v){ if(!v) return null; const d = new Date(v); return Number.isNaN(d.getTime()) ? null : d.getTime(); }
    function formatDateTime(ts){ if(!ts) return "Not set"; return new Date(ts).toLocaleString([], {year:"numeric", month:"short", day:"numeric", hour:"numeric", minute:"2-digit"}); }
    function formatClock(ms){ const s = Math.max(0, Math.floor(ms/1000)); const h=Math.floor(s/3600); const m=Math.floor((s%3600)/60); const sec=s%60; return [h,m,sec].map((n,i)=>i===0?String(n):String(n).padStart(2,"0")).join(":"); }
    function minutesToMs(min){ return Number(min||0)*60*1000; }
    function escapeHtml(v){ return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;"); }
    function parseAccommodations(v){ return String(v||"").split("|").map(x=>x.trim()).filter(Boolean); }

    function parseCSV(text){
      const rows=[]; let row=[]; let value=""; let inQuotes=false;
      for(let i=0;i<text.length;i++){
        const char=text[i], next=text[i+1];
        if(char === '"'){ if(inQuotes && next === '"'){ value += '"'; i++; } else inQuotes = !inQuotes; }
        else if(char === "," && !inQuotes){ row.push(value); value=""; }
        else if((char === "\n" || char === "\r") && !inQuotes){ if(char === "\r" && next === "\n") i++; row.push(value); if(row.some(c=>c !== "")) rows.push(row); row=[]; value=""; }
        else value += char;
      }
      if(value.length || row.length){ row.push(value); if(row.some(c=>c !== "")) rows.push(row); }
      if(!rows.length) return [];
      const headers = rows[0].map(h=>h.trim());
      return rows.slice(1).map(cols => {
        const obj={}; headers.forEach((h,i)=>obj[h]=(cols[i]||"").trim()); return obj;
      });
    }

    function normalizeRecord(record, index){
      return {
        id: record.student_id || `row_${index+1}`,
        student_name: record.student_name || `Student ${index+1}`,
        student_number: record.student_number || "",
        seat: record.seat || "",
        professor: record.professor || "",
        course_code: record.course_code || "",
        lecture_section: record.lecture_section || "",
        exam_minutes: Number(record.exam_minutes || 0),
        scheduled_start: toTimestamp(record.scheduled_start),
        location: record.location || "",
        break_type: (record.break_type || "none").toLowerCase(),
        break_allowance_minutes: Number(record.break_allowance_minutes || 0),
        accommodations: parseAccommodations(record.accommodations),
        notes: record.notes || "",
        arrival_time: null,
        started_at: null,
        finished_at: null,
        current_break_start: null,
        used_break_ms: 0,
        break_events: [],
        alert_10_sent: false,
        alert_1_sent: false,
        break_alert_sent: false,
        completion_notes: "",
        completion_collected_by: "",
        completion_materials_returned: "",
        professor_notified: "",
        checkin: {
          step: 0,
          late: false,
          late_reason: "",
          late_other_text: "",
          justified_late: "",
          invigilator_notes: "",
          pending_checkin_time: "",
          card_seen: false,
          student_seen: false,
          locker_taken: false,
          locker_number: "",
          signature_data_url: "",
          signed_at: null,
          completed: false,
          confirmed_time_basis: ""
        },
        history: [`${new Date().toLocaleString()}: Student record loaded from CSV`]
      };
    }

    function mergeSavedState(csvStudents, savedStudents){
      const savedMap = new Map(savedStudents.map(s => [s.id, s]));
      return csvStudents.map(csv => {
        const saved = savedMap.get(csv.id);
        if(!saved) return csv;
        return {
          ...csv,
          arrival_time: saved.arrival_time || null,
          started_at: saved.started_at || null,
          finished_at: saved.finished_at || null,
          current_break_start: saved.current_break_start || null,
          used_break_ms: saved.used_break_ms || 0,
          break_events: Array.isArray(saved.break_events) ? saved.break_events : [],
          alert_10_sent: !!saved.alert_10_sent,
          alert_1_sent: !!saved.alert_1_sent,
          break_alert_sent: !!saved.break_alert_sent,
          completion_notes: saved.completion_notes || "",
          completion_collected_by: saved.completion_collected_by || "",
          completion_materials_returned: saved.completion_materials_returned || "",
          professor_notified: saved.professor_notified || "",
          checkin: { ...csv.checkin, ...(saved.checkin || {}) },
          history: Array.isArray(saved.history) && saved.history.length ? saved.history : csv.history
        };
      });
    }

    async function loadStudentsFromCsv(){
      try{
        const response = await fetch(`${CSV_PATH}?v=${Date.now()}`, {cache:"no-store"});
        if(!response.ok) throw new Error("Could not load students.csv");
        const text = await response.text();
        const records = parseCSV(text);
        if(!records.length) throw new Error("students.csv is empty");
        const csvStudents = records.map(normalizeRecord);
        const savedRaw = localStorage.getItem(STORAGE_KEY);
        if(savedRaw){
          try{
            const saved = JSON.parse(savedRaw);
            students = Array.isArray(saved) ? mergeSavedState(csvStudents, saved) : csvStudents;
          }catch{
            students = csvStudents;
          }
        }else{
          students = csvStudents;
        }
        selectedCheckinId = students[0] ? students[0].id : null;
        saveState();
        renderAll();
      }catch(error){
        console.error(error);
        students = [];
        renderAll();
        alert(error.message);
      }
    }

    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(students)); }
    function updateStudent(id, updater){
      students = students.map(student => {
        if(student.id !== id) return student;
        const next = clone(student);
        updater(next);
        return next;
      });
      saveState();
      renderAll();
    }
    function getStudentById(id){ return students.find(s => s.id === id) || null; }
    function pushHistory(student, text){ student.history.unshift(`${new Date().toLocaleString()}: ${text}`); student.history = student.history.slice(0, 40); }
    function getElapsedExamMs(student){ if(!student.started_at) return 0; return Math.max(0, (student.finished_at || Date.now()) - student.started_at); }
    function getAllowedBreakMs(student){
      if(student.break_type === "none") return 0;
      if(student.break_type === "cumulative") return minutesToMs(student.break_allowance_minutes);
      if(student.break_type === "per_hour"){
        if(!student.started_at) return minutesToMs(student.break_allowance_minutes);
        const hoursEarned = Math.floor(getElapsedExamMs(student)/(60*60*1000)) + 1;
        return minutesToMs(student.break_allowance_minutes * hoursEarned);
      }
      return 0;
    }
    function getCurrentBreakMs(student){ if(!student.current_break_start) return 0; return Math.max(0, Date.now() - student.current_break_start); }
    function getTotalUsedBreakMs(student){ return student.used_break_ms + getCurrentBreakMs(student); }
    function getRemainingBreakMs(student){ return Math.max(0, getAllowedBreakMs(student) - getTotalUsedBreakMs(student)); }
    function getExamEndMs(student){ if(!student.started_at) return null; return student.started_at + minutesToMs(student.exam_minutes) + getTotalUsedBreakMs(student); }
    function getTimeRemainingMs(student){ if(!student.started_at || student.finished_at) return 0; return Math.max(0, getExamEndMs(student) - Date.now()); }
    function getStatus(student){ if(student.finished_at) return "finished"; if(student.current_break_start) return "on_break"; if(student.started_at) return "checked_in"; return "not_checked_in"; }
    function describeBreak(student){
      if(student.break_type === "none") return "No breaks";
      if(student.break_type === "cumulative") return `${student.break_allowance_minutes} min cumulative`;
      if(student.break_type === "per_hour") return `${student.break_allowance_minutes} min per hour`;
      return student.break_type;
    }

    function getNotificationMeta(student){
      if(!student.started_at || student.finished_at){
        return {level:null, label:"No active notification", speed:"", priority:0};
      }
      const examRemaining = getTimeRemainingMs(student);
      const breakRemaining = getRemainingBreakMs(student);
      if(student.current_break_start){
        if(breakRemaining <= 2*60*1000) return {level:"green", label:"Break ending soon", speed:"blink-fast", priority:4};
        return {level:"green", label:"On break", speed:"blink-slow", priority:1};
      }
      if(examRemaining <= 60*1000) return {level:"red", label:"Final 1 minute", speed:"blink-fast", priority:5};
      if(examRemaining <= 3*60*1000) return {level:"orange", label:"Very close to 10 minute notice", speed:"blink-fast", priority:3};
      if(examRemaining <= 10*60*1000) return {level:"orange", label:"10 minute notice active", speed:"blink-medium", priority:2};
      return {level:null, label:"No immediate notification", speed:"", priority:0};
    }

    function getActiveNotifications(){
      const arr = [];
      students.forEach(student => {
        const meta = getNotificationMeta(student);
        if(meta.level){
          let text = `${student.student_name}: ${meta.label}`;
          arr.push({studentId: student.id, ...meta, text});
        }
      });
      return arr.sort((a,b) => b.priority - a.priority);
    }

    function applyFlashingNotifications(){
      appRoot.classList.remove("flash-orange","flash-green","flash-red");
      globalNotificationBanner.className = "banner";
      globalNotificationBanner.textContent = "";
      homeBanner.className = "banner";
      homeBanner.textContent = "";
      if(notificationsSilenced) return;

      const notes = getActiveNotifications();
      if(!notes.length) return;
      const highest = notes[0];
      const text = highest.level === "red" ? "Urgent red notification active" : highest.level === "orange" ? "Orange exam notification active" : "Green break notification active";
      globalNotificationBanner.className = `banner show ${highest.level}`;
      globalNotificationBanner.textContent = text;
      homeBanner.className = `banner show ${highest.level}`;
      homeBanner.textContent = text;
      if(highest.level === "red") appRoot.classList.add("flash-red");
      if(highest.level === "orange") appRoot.classList.add("flash-orange");
      if(highest.level === "green") appRoot.classList.add("flash-green");
    }

    function switchScreen(name){
      document.querySelectorAll(".screen").forEach(screen => screen.classList.remove("active"));
      const nextScreen = document.getElementById(`screen-${name}`);
      if(nextScreen) nextScreen.classList.add("active");
      document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.screen === name));
    }

    function withPressedState(button){
      if(!button) return;
      button.classList.add("pressed");
      setTimeout(() => button.classList.remove("pressed"), 140);
    }

    function renderCheckedInSummary(targetEl){
      const checkedIn = students.filter(s => s.started_at && !s.finished_at);
      if(!targetEl) return;
      if(!checkedIn.length){
        targetEl.innerHTML = `<div class="empty">No students have been checked in yet.</div>`;
        return;
      }
      checkedIn.sort((a,b) => {
        const ap = getNotificationMeta(a).priority;
        const bp = getNotificationMeta(b).priority;
        if(bp !== ap) return bp - ap;
        return getTimeRemainingMs(a) - getTimeRemainingMs(b);
      });
      targetEl.innerHTML = checkedIn.map(student => {
        const meta = getNotificationMeta(student);
        const dot = meta.level ? `<span class="status-dot ${meta.level} ${meta.speed}"></span>` : `<span class="status-dot" style="background:#d1d5db"></span>`;
        const nextText = meta.label !== "No immediate notification" ? meta.label : `Next key event: ${formatDateTime(getExamEndMs(student))}`;
        const rowClass = meta.level ? `${meta.level}-active` : "";
        return `<div class="summary-row ${rowClass}"><div><div><strong>${escapeHtml(student.student_name)}</strong></div><div class="muted">${escapeHtml(student.course_code)} · Seat ${escapeHtml(student.seat)}</div></div><div style="display:flex;align-items:center;gap:10px;">${dot}<div style="text-align:right;"><div>${escapeHtml(nextText)}</div><div class="muted">${student.current_break_start ? "Break remaining " + formatClock(getRemainingBreakMs(student)) : "Time left " + formatClock(getTimeRemainingMs(student))}</div></div></div></div>`;
      }).join("");
    }

      renderCheckedInSummary(homeSummaryList);
      renderCheckedInSummary(checkinSummaryList);

    function getCheckinSteps(student){
      const step = student && student.checkin ? student.checkin.step || 0 : 0;
      return [
        {label:"Select Student", state: step > 0 ? "done" : "active"},
        {label:"Arrival", state: step > 1 ? "done" : step === 1 ? "active" : ""},
        {label:"Review", state: step > 2 ? "done" : step === 2 ? "active" : ""},
        {label:"Confirm", state: step > 3 ? "done" : step === 3 ? "active" : ""},
        {label:"Signature", state: step > 4 ? "done" : step === 4 ? "active" : ""}
      ];
    }

    function openSignatureForStudent(studentId){
      const student = getStudentById(studentId);

    function closeSignaturePage(){

    function resizeSignatureCanvas(){
      const rect = signatureCanvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      signatureCanvas.width = Math.floor(rect.width * ratio);
      signatureCanvas.height = Math.floor(rect.height * ratio);
      signatureCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
      signatureCtx.lineWidth = 2.5;
      signatureCtx.lineCap = "round";
      signatureCtx.lineJoin = "round";
      signatureCtx.strokeStyle = "#111827";
    }
    function clearSignatureCanvas(){ signatureCtx.clearRect(0,0,signatureCanvas.width,signatureCanvas.height); signatureHasInk = false; }
    function canvasPointFromEvent(event){
      const rect = signatureCanvas.getBoundingClientRect();
      let clientX=0, clientY=0;
      if(event.touches && event.touches[0]){ clientX = event.touches[0].clientX; clientY = event.touches[0].clientY; }
      else { clientX = event.clientX; clientY = event.clientY; }
      return {x: clientX - rect.left, y: clientY - rect.top};
    }
    function startDrawing(event){ event.preventDefault(); drawing = true; lastPoint = canvasPointFromEvent(event); }
    function draw(event){
      if(!drawing) return;
      event.preventDefault();
      const point = canvasPointFromEvent(event);
      signatureCtx.beginPath();
      signatureCtx.moveTo(lastPoint.x, lastPoint.y);
      signatureCtx.lineTo(point.x, point.y);
      signatureCtx.stroke();
      lastPoint = point;
      signatureHasInk = true;
    }
    function stopDrawing(event){ if(!drawing) return; event.preventDefault(); drawing = false; lastPoint = null; }

    function completeCheckinWithSignature(){
      if(!signatureStudentId) return;
      if(!signatureHasInk){ alert("Please sign in the signature box first."); return; }
      const dataUrl = signatureCanvas.toDataURL("image/png");
      updateStudent(signatureStudentId, next => {

        next.checkin.signature_data_url = dataUrl;
        next.checkin.signed_at = now;

        if(next.checkin.confirmed_time_basis === "start_after_signature_on_time" || next.checkin.confirmed_time_basis === "start_after_signature_justified_late"){
          next.started_at = now;
        }else if(!next.started_at){
          next.started_at = now;
        }

        pushHistory(next, "Student signed and check in completed");
      });
      closeSignaturePage();
      switchScreen("home");
    }

    function renderCheckout(){
      if(!students.length){ checkoutStudentList.innerHTML = `<div class="empty">No students loaded.</div>`; return; }
      const q = checkoutSearch.value.trim().toLowerCase();
      const f = checkoutFilter.value;
      const filtered = students.filter(student => [student.student_name, student.seat, student.course_code].join(" ").toLowerCase().includes(q) && (f === "all" || getStatus(student) === f));
      checkoutStudentList.innerHTML = "";
      if(!filtered.length){ checkoutStudentList.innerHTML = `<div class="empty">No students match your filter.</div>`; return; }
      filtered.forEach(student => {
        const status = getStatus(student);
        const card = document.createElement("div");
        card.className = "student-card";
        card.innerHTML = `
          <div class="student-header">
            <div><h3>${escapeHtml(student.student_name)}</h3><div class="pill-row"><span class="pill">Seat ${escapeHtml(student.seat)}</span><span class="pill">${escapeHtml(student.course_code)}</span><span class="pill ${status === "finished" ? "green" : status === "on_break" ? "orange" : ""}">${escapeHtml(status.replaceAll("_"," "))}</span></div></div>
          </div>
          <div class="detail-grid">
            <div><label>Collected by</label><input type="text" data-field="completion_collected_by" value="${escapeHtml(student.completion_collected_by || "")}" /></div>
            <div><label>Materials returned</label><select class="large" data-field="completion_materials_returned"><option value="" ${student.completion_materials_returned === "" ? "selected" : ""}>Select</option><option value="Yes" ${student.completion_materials_returned === "Yes" ? "selected" : ""}>Yes</option><option value="No" ${student.completion_materials_returned === "No" ? "selected" : ""}>No</option></select></div>
            <div><label>Professor notified</label><select class="large" data-field="professor_notified"><option value="" ${student.professor_notified === "" ? "selected" : ""}>Select</option><option value="Yes" ${student.professor_notified === "Yes" ? "selected" : ""}>Yes</option><option value="No" ${student.professor_notified === "No" ? "selected" : ""}>No</option></select></div>
            <div><label>Completion notes</label><textarea data-field="completion_notes">${escapeHtml(student.completion_notes || "")}</textarea></div>
          </div>
          <button class="action-btn red" type="button" data-action="finish" style="width:100%; margin-top:14px;" ${!student.started_at || student.finished_at ? "disabled" : ""}>Finish exam</button>
        `;
        const finishBtn = card.querySelector('[data-action="finish"]');
        if(finishBtn) finishBtn.addEventListener("click", e => { withPressedState(e.currentTarget); finishExam(student.id); });
        ["completion_collected_by","completion_materials_returned","professor_notified","completion_notes"].forEach(field => {
          const el = card.querySelector(`[data-field="${field}"]`);
          if(el) el.addEventListener(field === "completion_notes" ? "input" : "change", e => setField(student.id, field, e.target.value));
        });
        checkoutStudentList.appendChild(card);
      });
    }

    function renderStudents(){
      if(!students.length){ studentList.innerHTML = `<div class="empty">No students loaded.</div>`; return; }
      const q = studentSearch.value.trim().toLowerCase();
      const f = studentStatusFilter.value;
      const filtered = students.filter(student => [student.student_name, student.seat, student.course_code, student.professor].join(" ").toLowerCase().includes(q) && (f === "all" || getStatus(student) === f));
      studentList.innerHTML = "";
      if(!filtered.length){ studentList.innerHTML = `<div class="empty">No students match your filter.</div>`; return; }
      filtered.forEach(student => {
        const status = getStatus(student);
        const examRemaining = getTimeRemainingMs(student);
        const breakRemaining = getRemainingBreakMs(student);
        const card = document.createElement("div");
        card.className = "student-card";
        card.innerHTML = `
          <div class="student-header">
            <div>
              <h3>${escapeHtml(student.student_name)}</h3>
              <div class="pill-row">
                <span class="pill">Seat ${escapeHtml(student.seat)}</span>
                <span class="pill">${escapeHtml(student.course_code)}</span>
                <span class="pill">${escapeHtml(student.lecture_section)}</span>
                <span class="pill ${status === "finished" ? "green" : status === "on_break" ? "orange" : status === "not_checked_in" ? "red" : ""}">${escapeHtml(status.replaceAll("_"," "))}</span>
                <span class="pill ${student.checkin.completed ? "green" : "red"}">${student.checkin.completed ? "Check in complete" : "Check in incomplete"}</span>
              </div>
            </div>
            <div class="pill-row"><span class="pill">Professor: ${escapeHtml(student.professor)}</span><span class="pill">Room: ${escapeHtml(student.location)}</span></div>
          </div>
          <div class="stats">
            <div class="stat-box"><div class="label">Scheduled start</div><div class="value">${formatDateTime(student.scheduled_start)}</div></div>
            <div class="stat-box"><div class="label">Arrival</div><div class="value">${formatDateTime(student.arrival_time)}</div></div>
            <div class="stat-box"><div class="label">Adjusted end</div><div class="value">${student.started_at ? formatDateTime(getExamEndMs(student)) : "Not started"}</div></div>
            <div class="stat-box"><div class="label">Time remaining</div><div class="value">${student.started_at && !student.finished_at ? formatClock(examRemaining) : "N/A"}</div></div>
            <div class="stat-box"><div class="label">Exam length</div><div class="value">${student.exam_minutes} min</div></div>
            <div class="stat-box"><div class="label">Break rule</div><div class="value">${escapeHtml(describeBreak(student))}</div></div>
            <div class="stat-box"><div class="label">Break used</div><div class="value">${formatClock(getTotalUsedBreakMs(student))}</div></div>
            <div class="stat-box"><div class="label">Break remaining</div><div class="value">${formatClock(breakRemaining)}</div></div>
          </div>
          <div><label>History</label><div class="history">${student.history.map(item => `<div class="history-item">${escapeHtml(item)}</div>`).join("")}</div></div>
        `;
        studentList.appendChild(card);
      });
    }

    function renderBreaks(){
      if(!students.length){ breakList.innerHTML = `<div class="empty">No students loaded.</div>`; return; }
      const eligible = students.filter(student => student.started_at && !student.finished_at);
      breakList.innerHTML = "";
      if(!eligible.length){ breakList.innerHTML = `<div class="empty">No checked in students available for break management.</div>`; return; }
      eligible.forEach(student => {
        const onBreak = !!student.current_break_start;
        const remaining = getRemainingBreakMs(student);
        const card = document.createElement("div");
        card.className = "student-card";
        card.innerHTML = `
          <div class="student-header">
            <div><h3>${escapeHtml(student.student_name)}</h3><div class="pill-row"><span class="pill">Seat ${escapeHtml(student.seat)}</span><span class="pill">${escapeHtml(student.course_code)}</span><span class="pill ${onBreak ? "orange" : ""}">${onBreak ? "On break" : "Not on break"}</span></div></div>
          </div>
          <div class="stats">
            <div class="stat-box"><div class="label">Break rule</div><div class="value">${escapeHtml(describeBreak(student))}</div></div>
            <div class="stat-box"><div class="label">Break used</div><div class="value">${formatClock(getTotalUsedBreakMs(student))}</div></div>
            <div class="stat-box"><div class="label">Break remaining</div><div class="value">${formatClock(remaining)}</div></div>
            <div class="stat-box"><div class="label">Exam time left</div><div class="value">${formatClock(getTimeRemainingMs(student))}</div></div>
          </div>
          <div class="grid2">
            <button class="action-btn orange" type="button" data-action="start-break" ${onBreak ? "disabled" : ""}>Start break</button>
            <button class="action-btn gray" type="button" data-action="end-break" ${!onBreak ? "disabled" : ""}>End break</button>
          </div>
        `;
        const startBtn = card.querySelector('[data-action="start-break"]');
        const endBtn = card.querySelector('[data-action="end-break"]');
        if(startBtn) startBtn.addEventListener("click", e => { withPressedState(e.currentTarget); startBreak(student.id); });
        if(endBtn) endBtn.addEventListener("click", e => { withPressedState(e.currentTarget); endBreak(student.id); });
        breakList.appendChild(card);
      });
    }

    function renderNotifications(){
      const notes = getActiveNotifications();
      notificationList.innerHTML = "";
      if(!notes.length){ notificationList.innerHTML = `<div class="empty">No active notifications right now.</div>`; return; }
      notes.forEach(note => {
        const student = getStudentById(note.studentId);
        const card = document.createElement("div");
        card.className = "note-card";
        card.innerHTML = `<div class="pill-row" style="margin-bottom:10px;"><span class="status-dot ${note.level} ${note.speed}"></span><span class="pill">${escapeHtml(student ? student.student_name : "")}</span></div><div><strong>${escapeHtml(note.text)}</strong></div>`;
        notificationList.appendChild(card);
      });
    }

    function setField(id, field, value){ updateStudent(id, student => { student[field] = value; }); }
    function startBreak(id){
      updateStudent(id, student => {
        if(!student.started_at || student.finished_at || student.current_break_start) return;
        if(student.break_type === "none"){ alert("This student has no break allocation."); return; }
        if(getRemainingBreakMs(student) <= 0){ alert("No break time remains."); return; }
        student.current_break_start = Date.now();
        pushHistory(student, "Break started");
      });
    }
    function endBreak(id){
      updateStudent(id, student => {
        if(!student.current_break_start) return;
        const duration = Date.now() - student.current_break_start;
        student.used_break_ms += duration;
        student.break_events.push({start: student.current_break_start, end: Date.now(), duration_ms: duration});
        student.current_break_start = null;
        student.break_alert_sent = false;
        pushHistory(student, `Break ended after ${formatClock(duration)}`);
      });
    }
    function finishExam(id){
      const ok = confirm("Confirm that this student has finished the exam.");
      if(!ok) return;
      updateStudent(id, student => {
        if(student.current_break_start){
          const duration = Date.now() - student.current_break_start;
          student.used_break_ms += duration;
          student.break_events.push({start: student.current_break_start, end: Date.now(), duration_ms: duration});
          student.current_break_start = null;
        }
        student.finished_at = Date.now();
        pushHistory(student, "Exam marked finished");
      });
    }

    function renderAll(){
      renderHome();
      renderCheckin();
      renderCheckout();
      renderStudents();
      renderBreaks();
      renderNotifications();
      applyFlashingNotifications();
    }

    function tick(){
      let changed = false;
      students.forEach(student => {
        if(!student.started_at || student.finished_at) return;
        const examRemaining = getTimeRemainingMs(student);
        const breakRemaining = getRemainingBreakMs(student);
        if(examRemaining <= 10*60*1000 && examRemaining > 60*1000 && !student.alert_10_sent){ student.alert_10_sent = true; pushHistory(student, "10 minute exam alert reached"); changed = true; }
        if(examRemaining <= 60*1000 && !student.alert_1_sent){ student.alert_1_sent = true; pushHistory(student, "1 minute exam alert reached"); changed = true; }
        if(student.current_break_start && breakRemaining <= 2*60*1000 && !student.break_alert_sent){ student.break_alert_sent = true; pushHistory(student, "Break is close to ending"); changed = true; }
      });
      if(changed) saveState();
      renderAll();
    }

    function bindStaticEvents(){
      document.querySelectorAll("[data-screen]").forEach(btn => {
        btn.addEventListener("click", e => { withPressedState(e.currentTarget); switchScreen(e.currentTarget.dataset.screen); });
      });
      document.getElementById("reloadCsvBtn").addEventListener("click", e => { withPressedState(e.currentTarget); safeCall(loadStudentsFromCsv); });
      document.getElementById("silenceNotificationsBtn").addEventListener("click", e => { withPressedState(e.currentTarget); notificationsSilenced = true; applyFlashingNotifications(); });
      document.getElementById("unsilenceNotificationsBtn").addEventListener("click", e => { withPressedState(e.currentTarget); notificationsSilenced = false; applyFlashingNotifications(); });
      checkoutSearch.addEventListener("input", () => safeCall(renderCheckout));
      checkoutFilter.addEventListener("change", () => safeCall(renderCheckout));
      studentSearch.addEventListener("input", () => safeCall(renderStudents));
      studentStatusFilter.addEventListener("change", () => safeCall(renderStudents));
      clearSignatureBtn.addEventListener("click", e => { withPressedState(e.currentTarget); clearSignatureCanvas(); });
      cancelSignatureBtn.addEventListener("click", e => { withPressedState(e.currentTarget); closeSignaturePage(); });
      confirmSignatureBtn.addEventListener("click", e => { withPressedState(e.currentTarget); completeCheckinWithSignature(); });
      signatureCanvas.addEventListener("mousedown", startDrawing);
      signatureCanvas.addEventListener("mousemove", draw);
      signatureCanvas.addEventListener("mouseup", stopDrawing);
      signatureCanvas.addEventListener("mouseleave", stopDrawing);
      signatureCanvas.addEventListener("touchstart", startDrawing, {passive:false});
      signatureCanvas.addEventListener("touchmove", draw, {passive:false});
      signatureCanvas.addEventListener("touchend", stopDrawing, {passive:false});
      signatureCanvas.addEventListener("touchcancel", stopDrawing, {passive:false});
      window.addEventListener("resize", () => {
        if(signaturePage.classList.contains("active")){
          const saved = signatureCanvas.toDataURL();
          resizeSignatureCanvas();
          const img = new Image();
          img.onload = () => { signatureCtx.drawImage(img, 0, 0, signatureCanvas.clientWidth, signatureCanvas.clientHeight); };
          img.src = saved;
        }
      });
    }

    bindStaticEvents();
    safeCall(loadStudentsFromCsv);
    setInterval(() => safeCall(tick), 1000);
  </script>
</body>
</html>
